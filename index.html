<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>DressMate — Outfit Color Matcher</title>
<style>
  @font-face {
    font-family: "Fraunces";
    src: url("fonts/Fraunces.ttf") format("truetype");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Fraunces";
    src: url("fonts/Fraunces-Italic.ttf") format("truetype");
    font-weight: 100 900; font-style: italic; font-display: swap;
  }
  @font-face {
    font-family: "Space Grotesk";
    src: url("fonts/SpaceGrotesk.ttf") format("truetype");
    font-weight: 300 700; font-style: normal; font-display: swap;
  }
  :root {
    --bg: #0a0a0c;
    --surface: rgba(255, 255, 255, 0.045);
    --surface-strong: rgba(255, 255, 255, 0.085);
    --border: rgba(255, 255, 255, 0.13);
    --text: #f2efe6;
    --muted: #96938a;
    --accent: #c23b2a;
    --on-accent: #f7f1e8;
    --gold: #d4af6a;
    --danger: #e07a6a;
    --radius: 12px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --serif: "Fraunces", Georgia, serif;
    --sans: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans); font-size: 16px; line-height: 1.5;
    background:
      radial-gradient(110% 80% at 85% -5%, #15171f 0%, transparent 55%),
      radial-gradient(90% 70% at 0% 105%, #16120c 0%, transparent 50%),
      var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: max(14px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
  }
  .shell { max-width: 1060px; margin: 0 auto; }

  header.brand { display: flex; align-items: baseline; gap: 14px; margin: 4px 2px 16px; }
  .brand h1 {
    font-family: var(--serif); font-style: italic; font-weight: 650;
    font-size: 2.1rem; letter-spacing: 0.005em;
  }
  .brand .tag {
    color: var(--muted); font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
    border-left: 1px solid var(--border); padding-left: 14px;
  }

  .layout { display: grid; gap: 18px; }
  @media (min-width: 900px) {
    .layout { grid-template-columns: minmax(0, 7fr) minmax(300px, 5fr); align-items: start; }
    .stage-col { position: sticky; top: 16px; }
  }

  /* Garment segmented control */
  .garments {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 5px; margin-bottom: 14px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .garments button {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-height: 56px; padding: 8px 4px; border: none; border-radius: 8px;
    background: transparent; color: var(--muted); font-family: var(--sans);
    font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; touch-action: manipulation;
    transition: background 250ms var(--ease), color 250ms var(--ease);
  }
  .garments button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .garments button.active { background: var(--accent); color: var(--on-accent); font-weight: 600; }
  .garments button:not(.active):hover { background: var(--surface-strong); color: var(--text); }
  .garments button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* Camera stage */
  .stage {
    position: relative; border-radius: var(--radius); overflow: hidden;
    background: #050508; aspect-ratio: 3 / 4; border: 1px solid var(--border);
  }
  @media (min-width: 900px) { .stage { aspect-ratio: 4 / 5; } }
  @media (max-width: 899px) { .stage { aspect-ratio: auto; height: 46dvh; } }
  video, #photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  video.mirror { transform: scaleX(-1); }
  .reticle {
    position: absolute; left: 50%; top: 50%; width: 100px; height: 100px;
    transform: translate(-50%, -50%); pointer-events: none;
    border-radius: 14px;
    border: 2.5px solid rgba(255, 255, 255, 0.9);
    transition: border-color 400ms var(--ease);
  }
  .reticle.ready { border-color: var(--gold); }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
  #flash.on { animation: flashfx 450ms var(--ease); }
  @keyframes flashfx { from { opacity: 0.85; } to { opacity: 0; } }

  .status {
    position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 7px;
    padding: 6px 12px; border-radius: 999px; font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    background: rgba(5, 5, 8, 0.6); border: 1px solid var(--border);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #7fd48a; }
  .status.live .dot { animation: pulse 1.6s ease-in-out infinite; }
  .status.locked .dot { background: var(--gold); animation: none; }
  .status.photo .dot { background: #8ab8e0; animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

  .stage-tools { position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; }
  .tool {
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; background: rgba(5, 5, 8, 0.6); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; touch-action: manipulation;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: background 250ms var(--ease), color 250ms var(--ease);
  }
  .tool.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
  .tool svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  /* Slim detected pill — kept small so it never covers a face in selfie mode */
  .live-chip {
    position: absolute; left: 12px; bottom: 12px; max-width: 70%;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 8px; border-radius: 999px;
    background: rgba(5, 5, 8, 0.62); border: 1px solid var(--border);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .live-top { display: flex; align-items: center; gap: 10px; }
  .live-chip .swatch-lg {
    width: 34px; height: 34px; border-radius: 999px; flex: none;
    border: 2px solid rgba(255, 255, 255, 0.28);
    background: #444; transition: background 450ms var(--ease);
  }
  .live-chip .label { display: none; }
  .live-chip .name {
    font-family: var(--serif); font-style: italic; font-size: 1.25rem; font-weight: 600;
    line-height: 1.1; text-transform: capitalize; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* Compact suggestions — below the camera, never over your face */
  .live-sugs {
    display: grid; gap: 7px; margin-top: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .lg-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .lg-label {
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); width: 50px; flex: none;
  }
  .lg-item { display: flex; align-items: center; gap: 5px; font-size: 0.74rem; text-transform: capitalize; }
  .lg-dot { width: 14px; height: 14px; border-radius: 5px; border: 1.5px solid rgba(255, 255, 255, 0.25); }
  @media (min-width: 900px) { .live-sugs { display: none; } }

  .controls { display: flex; gap: 10px; margin-top: 12px; }
  .controls > * {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 50px; padding: 12px; border: 1px solid var(--border);
    border-radius: var(--radius); font-family: var(--sans); font-size: 0.88rem; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer; touch-action: manipulation;
    transition: background 250ms var(--ease), transform 150ms var(--ease);
  }
  .controls > *:active { transform: scale(0.97); }
  .controls svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  #scanBtn { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  #scanBtn:hover { background: #d24a35; }
  #uploadLbl { background: var(--surface); color: var(--text); }
  #uploadLbl:hover { background: var(--surface-strong); }
  #uploadLbl input { display: none; }
  .controls > *:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  #err { color: var(--danger); font-size: 0.85rem; margin: 10px 2px; display: none; }

  /* Suggestions panel */
  .panel { display: grid; gap: 12px; }
  .detected {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .detected .chip {
    width: 54px; height: 54px; border-radius: 10px; flex: none;
    border: 2px solid rgba(255, 255, 255, 0.22); background: #444;
    transition: background 450ms var(--ease);
  }
  .detected .label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
  .detected .name {
    font-family: var(--serif); font-style: italic; font-size: 1.8rem; font-weight: 620;
    line-height: 1.12; text-transform: capitalize;
  }

  .sug {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px 16px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    animation: rise 450ms var(--ease) backwards;
  }
  .sug:nth-child(2) { animation-delay: 40ms; }
  .sug:nth-child(3) { animation-delay: 80ms; }
  .sug:nth-child(4) { animation-delay: 120ms; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .sug h3 {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .swatches { display: flex; gap: 14px; flex-wrap: wrap; }
  .swatch { text-align: center; font-size: 0.72rem; color: var(--muted); text-transform: capitalize; }
  .swatch .box {
    width: 48px; height: 48px; border-radius: 10px; margin: 0 auto 5px;
    border: 2px solid rgba(255, 255, 255, 0.16);
    transition: transform 200ms var(--ease);
  }
  .swatch:hover .box { transform: scale(1.07); }

  /* Outfit builder */
  .outfit-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .outfit-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .outfit-head h3 {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted);
  }
  .score { display: flex; align-items: baseline; gap: 8px; font-size: 0.78rem; color: var(--muted); }
  .score b { font-family: var(--serif); font-size: 1.35rem; color: var(--gold); font-weight: 700; }
  .slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .slot {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 4px; border: none; background: transparent; cursor: pointer;
    font-family: var(--sans); font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); border-radius: 10px; min-height: 44px; touch-action: manipulation;
  }
  .slot:hover { background: var(--surface-strong); }
  .slot .well {
    width: 40px; height: 40px; border-radius: 9px;
    border: 2px dashed var(--border); transition: background 300ms var(--ease);
  }
  .slot.filled .well { border-style: solid; border-color: rgba(255, 255, 255, 0.25); }
  .slot .cname { text-transform: capitalize; }
  .outfit-actions { display: flex; gap: 8px; }
  .outfit-actions button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    min-height: 44px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text); font-family: var(--sans);
    font-size: 0.82rem; font-weight: 600; cursor: pointer; touch-action: manipulation;
    transition: background 250ms var(--ease), opacity 250ms var(--ease);
  }
  .outfit-actions button:hover:not(:disabled) { background: var(--surface-strong); }
  .outfit-actions button:disabled { opacity: 0.4; cursor: default; }
  .outfit-actions svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .outfit-hint { font-size: 0.78rem; color: var(--muted); margin-bottom: 12px; }

  .look {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 0; margin-top: 10px; border-top: 1px solid var(--border);
    font-size: 0.78rem; color: var(--muted);
  }
  .look .mini { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.18); flex: none; }
  .look .lscore { margin-left: auto; font-weight: 600; color: var(--text); }
  .look .del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 6px; border-radius: 8px; min-width: 32px; min-height: 32px;
  }
  .look .del:hover { color: var(--danger); background: var(--surface-strong); }
  .look .del svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  .toast {
    position: fixed; left: 50%; bottom: max(24px, env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px); opacity: 0;
    background: var(--surface-strong); border: 1px solid var(--border);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--text); font-size: 0.85rem; font-weight: 500;
    padding: 10px 18px; border-radius: 999px; pointer-events: none;
    transition: opacity 300ms var(--ease), transform 300ms var(--ease);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .placeholder {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 26px 20px; text-align: center;
    color: var(--muted); font-size: 0.9rem;
  }
  .placeholder strong { color: var(--text); font-weight: 600; font-family: var(--serif); font-style: italic; font-size: 1.1rem; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="brand">
    <h1>DressMate</h1>
    <span class="tag">Outfit color matcher</span>
  </header>

  <div class="layout">
    <div class="stage-col">
      <div class="garments" id="garments" role="tablist" aria-label="Garment being scanned">
        <button data-g="shirt" class="active" aria-label="Scanning a shirt">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4 L4 7 L5.5 11 L7.5 10 V20 H16.5 V10 L18.5 11 L20 7 L16 4 C15 5.4 13.6 6 12 6 C10.4 6 9 5.4 8 4 Z"/></svg>
          Shirt
        </button>
        <button data-g="pants" aria-label="Scanning pants">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3 H17 L18.5 21 H14 L12 10 L10 21 H5.5 Z M7 7 H17"/></svg>
          Pants
        </button>
        <button data-g="jacket" aria-label="Scanning a jacket">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4 L5 6.5 V20 H9.5 L12 9 L14.5 20 H19 V6.5 L15 4 L12 7.5 Z"/></svg>
          Jacket
        </button>
        <button data-g="tie" aria-label="Scanning a tie">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 3 H14 L13 6.5 H11 Z M11 6.5 H13 L14.5 16 L12 20.5 L9.5 16 Z"/></svg>
          Tie
        </button>
      </div>

      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <img id="photo" alt="Uploaded garment photo" hidden>
        <div class="reticle" id="reticle"></div>
        <div id="flash"></div>
        <div class="status live" id="status"><span class="dot"></span><span id="statusText">Live</span></div>
        <div class="stage-tools">
          <button class="tool active" id="autoBtn" aria-label="Auto-snap on" aria-pressed="true" title="Auto-snap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2 L5 13 H11 L10 22 L19 10 H13 Z"/></svg>
          </button>
          <button class="tool" id="flipBtn" aria-label="Flip camera" title="Flip camera" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9 a8 6 0 0 1 15 -1 M20 15 a8 6 0 0 1 -15 1 M19 4 V8 H15 M5 20 V16 H9"/></svg>
          </button>
        </div>
        <div class="live-chip">
          <div class="live-top">
            <div class="swatch-lg" id="liveSwatch"></div>
            <div>
              <div class="label">Detecting</div>
              <div class="name" id="liveName">Point at fabric</div>
            </div>
          </div>
        </div>
      </div>

      <div class="live-sugs" id="liveSugs" hidden></div>

      <div class="controls">
        <button id="scanBtn" aria-label="Lock detected color">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10 V7 a4 4 0 0 1 8 0 v3"/></svg>
          <span id="scanLabel">Lock color</span>
        </button>
        <label id="uploadLbl">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 17 L9 12.5 L13 15.5 L17 12 L21 15"/></svg>
          Use photo
          <input type="file" id="fileInput" accept="image/*">
        </label>
      </div>
      <p id="err" role="alert"></p>
    </div>

    <div class="panel">
      <div id="result" style="display:none">
        <div class="detected" style="margin-bottom:12px">
          <div class="chip" id="chip"></div>
          <div>
            <div class="label">Your <span id="detGarment">shirt</span> is</div>
            <div class="name" id="detName">—</div>
          </div>
        </div>
        <div id="suggestions" class="panel"></div>
      </div>

      <div class="outfit-card">
        <div class="outfit-head">
          <h3>My outfit</h3>
          <div class="score" id="scoreBadge" hidden><b id="scoreNum"></b><span id="scoreVerdict"></span></div>
        </div>
        <p class="outfit-hint" id="outfitHint">Lock a color to add that garment to your outfit. Tap a slot to clear it.</p>
        <div class="slots" id="slots">
          <button class="slot" data-slot="shirt" aria-label="Shirt slot, empty"><span class="well"></span><span class="cname">Shirt</span></button>
          <button class="slot" data-slot="pants" aria-label="Pants slot, empty"><span class="well"></span><span class="cname">Pants</span></button>
          <button class="slot" data-slot="jacket" aria-label="Jacket slot, empty"><span class="well"></span><span class="cname">Jacket</span></button>
          <button class="slot" data-slot="tie" aria-label="Tie slot, empty"><span class="well"></span><span class="cname">Tie</span></button>
        </div>
        <div class="outfit-actions">
          <button id="saveBtn" disabled aria-label="Save this look">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3 H16 L20 7 V19 a2 2 0 0 1 -2 2 H6 a2 2 0 0 1 -2 -2 V5 a2 2 0 0 1 2 -2 Z M8 3 V8 H15 V3 M7 21 V14 H17 V21"/></svg>
            Save look
          </button>
          <button id="shareBtn" disabled aria-label="Share this look">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="12" r="2.5"/><circle cx="17" cy="6" r="2.5"/><circle cx="17" cy="18" r="2.5"/><path d="M8.3 10.8 L14.8 7.2 M8.3 13.2 L14.8 16.8"/></svg>
            Share
          </button>
        </div>
        <div id="looks"></div>
      </div>

      <div class="placeholder" id="placeholder">
        <strong>Wear it with confidence.</strong><br>
        Point the camera at your garment — matching colors for the rest of
        your outfit appear here automatically.
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<canvas id="canvas" hidden></canvas>
<script type="module" src="app.js"></script>
</body>
</html>
